<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>😶 에이블 교구 점검</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#e6e8f0;
      --text:#111827;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-weak:#e8f0ff;
      --danger:#b00020;
      --shadow: 0 6px 20px rgba(17,24,39,.06);
      --radius:14px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:"Noto Sans KR", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    .wrap{
      max-width: 1180px;
      margin: 18px auto 40px;
      padding: 0 14px;
    }

    header{
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      border-radius: var(--radius);
      padding:14px;
      position: sticky;
      top: 10px;
      z-index: 20;
    }

    .headerTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .titleRow{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      min-width:0;
      flex:1 1 auto;
    }

    .headerActionsTop{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
      flex:0 0 auto;
    }
    h1{
      font-size:18px;
      margin:0;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .badge{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:var(--primary-weak);
      color:var(--primary);
      font-weight:700;
      line-height:1.35;
    }
    .modeTabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }

    .modeBtn{
      border:1px solid var(--line);
      background:#fff;
      padding:0 14px;
      height:44px;
      border-radius:999px;
      cursor:pointer;
      font-weight:800;
      font-size:13px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      transition:all .15s ease;
    }

    .modeBtn:hover{
      background:#f8faff;
      border-color:#cfd8ea;
    }

    .modeBtn.active{
      background: var(--primary);
      color:#fff;
      border-color: var(--primary);
    }

    .modeBtn.link{
      color:#6b7280;
    }

    .headerMid{
      display:grid;
      grid-template-columns: 0.8fr 1.2fr 0.8fr 0.8fr;
      gap:10px;
      align-items:center;
      margin-bottom:12px;
    }

    .fieldBox{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .fieldBox label{
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .fieldBox input{
      width:100%;
      min-width:0;
    }

    .copyBox{
      display:none;
    }

    .headerBottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .tabs{
      display:flex;
      gap:8px;
      margin-top:0;
      flex-wrap:wrap;
    }

    .tab{
      border:1px solid var(--line);
      background:#fff;
      padding:8px 10px;
      border-radius:999px;
      cursor:pointer;
      font-weight:800;
      font-size:13px;
    }

    .tab[aria-selected="true"]{
      background: var(--primary-weak);
      border-color: rgba(37,99,235,.25);
      color: var(--primary);
    }

    .actionBtns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    input[type="text"], input[type="number"], textarea{
      font-family: inherit;
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 10px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    textarea{
      width:100%;
      resize:vertical;
      min-height:72px;
      white-space: pre-wrap;
    }

    .btn{
      border:1px solid var(--line);
      background:#fff;
      padding:0 14px;
      min-height:44px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
      white-space:nowrap;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:all .15s ease;
      text-decoration:none;
      color:var(--text);
    }

    .btn.printQuick,
    .btn.printQuick:hover{
      text-decoration:none;
    }

    .btn:hover{
      background:#f8faff;
      border-color:#cfd8ea;
    }

    .btn.primary{
      border-color: transparent;
      background: var(--primary);
      color:#fff;
    }

    .btn.primary:hover{
      filter:brightness(0.98);
    }

    .btn.ghost{
      background: transparent;
    }

    .btn.danger{
      border-color: rgba(176,0,32,.25);
      color: var(--danger);
      background: #fff;
    }

    .btn:active{ transform: translateY(1px); }

    .layout{
      display:grid;
      grid-template-columns: 340px 1fr;
      gap:14px;
      margin-top:14px;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      border-radius: var(--radius);
      padding:14px;
      min-height: 420;
    }

    .panel h2{
      margin:0 0 10px;
      font-size:15px;
    }

    .help{
      font-size:12px;
      color:var(--muted);
      margin:6px 0 0;
      line-height:1.45;
    }

    .filterRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:10px;
    }

#extrasMemoBox{
  width:100%;
  min-height:72px;
  white-space:pre-wrap;   /* ← 이걸로 변경 */
  overflow-y:auto;        /* 세로 스크롤 */
}

.totalsInline{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
  margin-top:10px;
}

.totalCard{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
}

.totalCard strong{
  font-size:13px;
  font-weight:800;
  color:#374151;
}

.totalCard input{
  width:100px;
  text-align:center;
}

    .list{
      border:1px solid var(--line);
      border-radius: 12px;
      overflow:hidden;
    }

    .listHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 10px;
      background:#fafbff;
      border-bottom:1px solid var(--line);
      font-weight:800;
      font-size:13px;
    }

    .listBody{
      max-height: 560px;
      overflow:auto;
      padding:8px;
      background:#fff;
    }

    .item{
      display:flex;
      gap:10px;
      align-items:center;
      padding:10px 10px;
      border-radius:12px;
      cursor:pointer;
      user-select:none;
    }

    .item:hover{ background:#f7f8ff; }

    .item strong{
      font-size:13px;
      font-weight:800;
    }

    .tabPanel{
      height: auto;
      max-height: calc(100vh - 260px);
      overflow:auto;
      padding-right:6px;
    }

    .contentTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
      background: var(--card);
      padding: 6px 0 10px;
      border-bottom: 1px solid var(--line);
    }

    .count{
      font-weight:900;
      color:var(--primary);
    }

    .card{
      border:1px solid var(--line);
      border-radius: 14px;
      padding:12px;
      background:#fff;
      margin-bottom:12px;
      position: relative;
      overflow: visible;
    }


    .cardTitle{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .cardTitleMain{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
      flex:1 1 auto;
    }

    .cardTitleActions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-left:auto;
      position:relative;
    }

    .printInlineDesc{
      margin-left:6px;
      font-size:12px;
      color:#9ca3af; /* 연한 회색 */
      font-weight:500;
    }

    .btn.printQuick{
      min-height:36px;
      padding:0 12px;
      border-radius:10px;
      font-size:12px;
      font-weight:800;
      background:#eff6ff;
      color:#2563eb;
      border:1px solid #cfe0ff;
    }

    .btn.printQuick:hover{
      background:#e8f0ff;
      border-color:#bfd1ff;
    }

    .printMenu{
      position:absolute;
      top:calc(100% + 6px);
      right:0;
      bottom:auto;
      min-width:360px;
      padding:8px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#ffffff;
      box-shadow:0 10px 24px rgba(17,24,39,.10);
      display:none;
      z-index:10;
    }

    .printMenu.open{
      display:block;
    }

    .printMenuItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px;
      border-radius:10px;
    }

    .printMenuItem:hover{
      background:#f8faff;
    }

    .printMenuItem + .printMenuItem{
      margin-top:4px;
    }

    .printMenuLabel{
      font-size:14px;
      font-weight:700;
      color:#374151;
      line-height:1.35;
    }

    .printMenuBtns{
      display:flex;
      gap:6px;
      flex:0 0 auto;
    }

    .printMiniBtn{
      min-height:32px;
      padding:0 10px;
      border-radius:9px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }

    .printMiniBtn:hover{
      background:#f8faff;
      border-color:#cfd8ea;
    }

    .printMiniBtn.primary{
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

.printExtraHeading{
  font-size:16px;
  font-weight:900;
  margin:16px 0 6px;
}

.printExtraText{
  font-size:14px;
  font-weight:800;
  line-height:1.6;
  white-space:pre-wrap;
}

    @media (max-width: 980px){
      .cardTitleActions{
        width:100%;
        margin-left:0;
        justify-content:flex-start;
      }

      .printMenu{
        left:0;
        right:auto;
      }
    }

    .cardTitle h3{
      margin:0;
      font-size:15px;
      font-weight:800;
      line-height:1.3;
      flex:0 0 auto;
    }

    .mini{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .rowInputs{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap:10px;
    }

    .inField{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius: 12px;
      background:#fff;
    }

    .inField span{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      white-space:nowrap;
    }

    .inField input{
      width:72px;
      max-width:72px;
      padding:6px 6px;
      text-align:center;
    }

    .programTag{
      position:relative;
      cursor:pointer;
    }

    .tagTooltip{
      position:absolute;
      bottom:120%;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      padding:6px 10px;
      border-radius:8px;
      font-size:12px;
      white-space:nowrap;
      display:none;
      z-index:50;
      pointer-events:none;
    }

    .programTag:hover .tagTooltip{
      display:block;
    }

    table{
      width:100%;
      border-collapse: collapse;
      border:1px solid var(--line);
      border-radius: 12px;
      overflow:hidden;
      background:#fff;
    }

    th, td{
      border-bottom:1px solid var(--line);
      padding:10px 10px;
      font-size:13px;
      vertical-align:top;
    }

    th{
      background:#fafbff;
      text-align:left;
      color:#374151;
      font-weight:900;
    }

    tr:last-child td{ border-bottom:none; }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      font-size: 12.5px;
      border:1px solid var(--line);
      border-radius: 12px;
      padding:12px;
      background:#fff;
    }

    .previewEdit{
      width:100%;
      min-height:520px;
      resize:vertical;
      border:1px solid var(--line);
      outline:none;
    }

    .sectionTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin:14px 0 8px;
    }

    .sectionTop h2{
      margin:0;
      font-size:15px;
    }

    .emptyBox{
      border:1px dashed var(--line);
      border-radius:12px;
      padding:18px;
      color:var(--muted);
      background:#fafbff;
      font-size:13px;
    }

.singleLineMemo{
  width:100%;
  min-height:56px;
  resize:none;
  white-space:pre-wrap;
  overflow-y:auto;
}

    .printArea{ display:none; }

    .infoNoteBox{
      margin:8px 0 12px;
      padding:14px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fafbff;
    }

    .infoNoteTitle{
      font-size:16px;
      font-weight:800;
      color:var(--text);
      margin-bottom:8px;
    }

    .infoNoteContent{
      white-space:pre-line;
      font-size:14px;
      line-height:1.6;
      color:#374151;
    }

    .programTags{
      display:flex;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      margin-left:2px;
    }

    .programTag{
      font-size:11px;
      padding:2px 8px;
      border-radius:10px;
      font-weight:700;
      white-space:nowrap;
      margin-left:0;
      display:inline-flex;
      align-items:center;
    }
    .tag-career{
      background:#edf3ff;
      color:#2f6df6;
    }

    .tag-subject{
      background:#f4ecff;
      color:#7a3df0;
    }

    .tag-sustain{
      background:#eafaf0;
      color:#1e9e55;
    }

    .tag-elementary{
      background:#fff4e8;
      color:#f28b24;
    }

    .tag-camp{
      background:#f5f6f8;
      color:#5a6168;
    }

    .tag-booth{
      background:#fff8e5;
      color:#b38b00;
    }

    .tag-civic{
      background:#eef1f8;
      color:#2f3e73;
    }

    @page{
      size: A4;
      margin: 14mm 12mm 14mm 12mm;
    }

    .printSheet{
      width:100%;
    }

.printHead{
  margin-bottom: 12px;
}

.printHeadTitle{
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 8px;
}

.printMeta{
  display:flex;
  flex-wrap:wrap;
  gap:18px;
  font-size: 13px;
  font-weight: 800;
  padding-bottom: 8px;
  border-bottom: 2px solid #111827;
}

.printMeta div{
  line-height:1.4;
}

.printProgram{
  margin-bottom: 10px;
  break-inside: avoid;
  page-break-inside: avoid;
}

.printProgramTitle{
  font-size: 14px;
  font-weight: 900;
  margin-bottom: 3px;
}

.printProgramContent{
  white-space: pre-wrap;
  font-size: 11.5px;
  line-height: 1.45;
  margin-left: 2px;
}

    .printSummary{
      margin-top: 16px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .printSummaryTitle{
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .printSummaryLine{
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .printExtraBlock{
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.5;
    }

    .usbTableWrap{
      margin-top:12px;
      border-radius:12px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#ffffff;
    }

    .usbTable{
      width:100%;
      border-collapse:collapse;
      background:#ffffff;
      color:var(--text);
      table-layout:fixed;
    }

    .usbTable th,
    .usbTable td{
      padding:8px 12px;
      text-align:left;
      border-bottom:1px solid var(--line);
      font-size:12.5px;
      line-height:1.3;
      vertical-align:top;
      word-break:keep-all;
    }

    .usbTable th{
      background:#eef4ff;
      color:#2563eb;
      font-weight:800;
    }

    .usbTable td{
      color:#111827;
      font-weight:500;
    }

    .usbTable tbody tr:last-child td{
      border-bottom:none;
    }

    .usbTable tbody tr:hover{
      background:#f8fbff;
    }

    .usbTable th:first-child,
    .usbTable td:first-child{
      width:22%;
      min-width:110px;
      font-weight:700;
      color:#111827;
    }

    .usbTable th:last-child,
    .usbTable td:last-child{
      width:78%;
      color:#374151;
    }

    @media (max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }

      header{
        position:static;
      }

      .headerTop{
        flex-direction:column;
        align-items:flex-start;
      }

      .headerActionsTop{
        width:100%;
        justify-content:flex-start;
      }

      .modeTabs{
        justify-content:flex-start;
      }

      .headerMid{
        grid-template-columns: 1fr 1fr;
      }

      .headerBottom{
        flex-direction:column;
        align-items:flex-start;
      }

      .actionBtns{
        width:100%;
      }

      .tabPanel{
        height:auto;
        min-height:auto;
        overflow:visible;
      }

      .rowInputs{
        grid-template-columns: 1fr 1fr;
      }
      .headerMid{
        grid-template-columns: 1fr 1fr;
      }

      .copyBox{
        grid-column: 1 / -1;
        justify-content:flex-start;
      }
    }

    @media print{
      .no-print{ display:none !important; }
      .programTags{ display:none !important; }
      body{ background:#fff; }
      .wrap{ max-width:none; margin:0; padding:0; }
      header{ display:none !important; }
      .panel{
        box-shadow:none;
        border-radius:0;
        border:none;
        padding:0;
        min-height:auto;
      }
      .layout{ grid-template-columns:1fr; }
      .tabPanel{ display:none !important; }
      .printArea{ display:block !important; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <header class="no-print">
    <div class="headerTop">
      <div class="titleRow">
        <h1>교구 점검표</h1>
        <span class="badge">수업/부스 선택 → 학교 정보 입력 → 프로그램 선택 → 복사 후 공유</span>
      </div>

      <div class="headerActionsTop">
        <div class="modeTabs">
          <a href="https://kikidayun.github.io/ableEDU/" class="modeBtn link">자료실</a>
          <button class="modeBtn active" id="modeLesson">수업용</button>
          <button class="modeBtn" id="modeBooth">부스용</button>
        </div>

        <button class="btn primary" id="btnCopy">톡용 복사</button>
      </div>
    </div>

    <div class="headerMid">
      <div class="fieldBox">
        <label for="date">날짜</label>
        <input id="date" type="text" placeholder="예: 12/22" />
      </div>

      <div class="fieldBox">
        <label for="school">학교명</label>
        <input id="school" type="text" placeholder="예: 대전 탄방중" />
      </div>

      <div class="fieldBox">
        <label for="session">차시</label>
        <input id="session" type="text" placeholder="예: 2차시" />
      </div>


      <div class="fieldBox">
        <label for="people">인원(전체)</label>
        <input id="people" type="number" min="0" step="1" placeholder="예: 30" />
      </div>
    </div>

    <div class="headerBottom">
      <div class="tabs" role="tablist" aria-label="탭">
        <button class="tab" id="tabAssign" aria-selected="true">프로그램 배정</button>
        <button class="tab" id="tabTotals" aria-selected="false">교구 확인</button>
      </div>

      <div class="actionBtns">
        <button class="btn" id="btnPrint">출력</button>

  function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

  function getProgramsByMode(mode){
    return mode === "lesson" ? LESSON_PROGRAM_MASTER : BOOTH_PROGRAM_MASTER;
  }

  function getSetsByMode(mode){
    if(mode === "lesson"){
      return {
        tablet: TABLET_PER_PERSON_LESSON,
        laptopHalf: LAPTOP_HALF_LESSON,
        laptopPer: LAPTOP_PER_PERSON_LESSON,
        smartphone: SMARTPHONE_PER_PERSON_LESSON
      };
    }
    return {
      tablet: TABLET_PER_PERSON_BOOTH,
      laptopHalf: LAPTOP_HALF_BOOTH,
      laptopPer: LAPTOP_PER_PERSON_BOOTH,
      smartphone: SMARTPHONE_PER_PERSON_BOOTH
    };
  }

  function getModeLabel(mode){
    return mode === "lesson" ? "수업용" : "부스용";
  }

  function getAutoDeviceDefaults(mode, programName, people){
    const p = Math.max(0, Number(people)||0);
    const sets = getSetsByMode(mode);
    let laptop = 0;
    let tablet = 0;
    let smartphone = 0;

    if(sets.tablet.has(programName)) tablet = p;
    if(sets.laptopHalf.has(programName)) laptop = Math.ceil(p / 2);
    if(sets.laptopPer.has(programName)) laptop = p;
    if(sets.smartphone.has(programName)) smartphone = p;

    return { laptop, tablet, smartphone };
  }

  function makeDefaultProgramData(mode, program, people){
    const auto = getAutoDeviceDefaults(mode, program.name, people);
    return {
      students: Number.isFinite(people) ? people : 0,
      notes: program.notes || "",
      laptop: auto.laptop,
      tablet: auto.tablet,
      smartphone: auto.smartphone,
    };
  }

  function clampInt(v){
    const n = Number(String(v).replace(/[^0-9-]/g,""));
    if(!Number.isFinite(n)) return 0;
    return Math.max(0, Math.trunc(n));
  }

  function normalizeProgramData(d, p){
    if(typeof d.students !== "number") d.students = 0;
    if(typeof d.notes !== "string") d.notes = p.notes || "";
    if(typeof d.laptop !== "number") d.laptop = 0;
    if(typeof d.tablet !== "number") d.tablet = 0;
    if(typeof d.smartphone !== "number") d.smartphone = 0;

  function buildModeData(mode){
    const base = deepClone(DEFAULT_MODE_DATA[mode]);
    const people = clampInt(base.meta.people);
    const programs = getProgramsByMode(mode);
    for(const p of programs){
      base.programData[p.id] = makeDefaultProgramData(mode, p, people);
    }
    return base;
  }

  function initState(){
    return {
      mode: "lesson",
      lesson: buildModeData("lesson"),
      booth: buildModeData("booth")
    };
  }

  function loadState(){
    try{
      const raw = sessionStorage.getItem(STORAGE_KEY);
      if(!raw) return initState();

      const parsed = JSON.parse(raw);

      if(parsed && parsed.mode && parsed.lesson && parsed.booth){
        const base = initState();
        base.mode = parsed.mode === "booth" ? "booth" : "lesson";
        base.lesson = { ...base.lesson, ...(parsed.lesson || {}) };
        base.booth = { ...base.booth, ...(parsed.booth || {}) };

        for(const mode of ["lesson","booth"]){
          const programs = getProgramsByMode(mode);
          const current = base[mode];

          current.meta = { school:"", session:"", date:"", people:0, ...(current.meta||{}) };
          current.selected = Array.isArray(current.selected) ? current.selected : [];
          current.programData = current.programData || {};
          current.totalsOverrides = current.totalsOverrides || {};
          current.extrasDevices = current.extrasDevices || { laptop:0, tablet:0, smartphone:0 };
          current.previewText = typeof current.previewText === "string" ? current.previewText : "";
          current.extrasMemo = typeof current.extrasMemo === "string" ? current.extrasMemo : (DEFAULT_MODE_DATA[mode].extrasMemo || "");

          for(const p of programs){
            if(!current.programData[p.id]){
              current.programData[p.id] = makeDefaultProgramData(mode, p, clampInt(current.meta.people));
            }else{
              normalizeProgramData(current.programData[p.id], p);
            }
          }
        }
        return base;
      }

      if(parsed && parsed.meta && parsed.programData){
        const migrated = initState();
        migrated.mode = "lesson";
        migrated.lesson.meta = { ...migrated.lesson.meta, ...(parsed.meta || {}) };
        migrated.lesson.selected = Array.isArray(parsed.selected) ? parsed.selected : [];
        migrated.lesson.programData = parsed.programData || {};
        migrated.lesson.totalsOverrides = parsed.totalsOverrides || {};
        migrated.lesson.extrasDevices = parsed.extrasDevices || { laptop:0, tablet:0, smartphone:0 };
        migrated.lesson.previewText = typeof parsed.previewText === "string" ? parsed.previewText : "";
        migrated.lesson.extras = Array.isArray(parsed.extras) ? parsed.extras : deepClone(DEFAULT_MODE_DATA.lesson.extras);
        migrated.lesson.extrasMemo = typeof parsed.extrasMemo === "string"  ? parsed.extrasMemo  : (DEFAULT_MODE_DATA.lesson.extrasMemo || "");

        for(const p of LESSON_PROGRAM_MASTER){
          if(!migrated.lesson.programData[p.id]){
            migrated.lesson.programData[p.id] = makeDefaultProgramData("lesson", p, clampInt(migrated.lesson.meta.people));
          }else{
            normalizeProgramData(migrated.lesson.programData[p.id], p);
          }
        }

        return migrated;
      }

      return initState();
    }catch{
      return initState();
    }
  }

  function buildProgramText(id){
    const current = getCurrentData();
    const p = getCurrentPrograms().find(x=>x.id===id);
    const d = current.programData[id];
    if(!p || !d) return null;

    const lines = [];
    if(Number(d.laptop||0) > 0) lines.push(`- 노트북 ${Number(d.laptop)}`);
    if(Number(d.tablet||0) > 0) lines.push(`- 태블릿 ${Number(d.tablet)}`);
    if(Number(d.smartphone||0) > 0) lines.push(`- 스마트폰 ${Number(d.smartphone)}`);

    const memo = (d.notes||"").trim();
    if(memo) lines.push(memo);

    return {
      title: `${p.name} (${Number(d.students||0)})`,
      content: lines.join("\n")
    };
  }

function buildPreviewProgramText(id){
  const current = getCurrentData();
  const p = getCurrentPrograms().find(x=>x.id===id);
  const d = current.programData[id];
  if(!p || !d) return null;

  const lines = [];
  if(Number(d.laptop||0) > 0) lines.push(`- 노트북 ${Number(d.laptop)}`);
  if(Number(d.tablet||0) > 0) lines.push(`- 태블릿 ${Number(d.tablet)}`);
  if(Number(d.smartphone||0) > 0) lines.push(`- 스마트폰 ${Number(d.smartphone)}`);

  const memo = (d.notes||"")
    .split("\n")
    .map(v => v.trim())
    .filter(v => v)
    .filter(v => !v.startsWith("⚠️ 확인"))
    .filter(v => !v.startsWith("🔋 소모"))
    .join("\n");

  if(memo) lines.push(memo);

  return {
    title: `${p.name} (${Number(d.students||0)})`,
    content: lines.join("\n")
  };
}

  function buildKakaoText(){
    const current = getCurrentData();
    const meta = current.meta;
    const date = (meta.date || "").trim();
    const school = (meta.school || "").trim();
    const session = (meta.session || "").trim();
    const people = Number(meta.people || 0);

    const headerParts = [];
    if(date) headerParts.push(date);
    if(school) headerParts.push(school);
    if(session) headerParts.push(session);

    const header = `◆ ${headerParts.join(" ")}${people > 0 ? ` (${people}명)` : ""}`.trim();

    const blocks = [];

    for(const id of current.selected){
      const programBlock = buildPreviewProgramText(id);
      if(!programBlock) continue;

      let text = `✔ ${programBlock.title}\n`;
      if(programBlock.content) text += `${programBlock.content}\n`;
      blocks.push(text.trim());
    }

    const totals = calcTotals();
    const totalParts = [];
    if(current.manualTotals?.["노트북"]) totals["노트북"] = current.totalsOverrides["노트북"];
    if(current.manualTotals?.["태블릿"]) totals["태블릿"] = current.totalsOverrides["태블릿"];
    if(current.manualTotals?.["스마트폰"]) totals["스마트폰"] = current.totalsOverrides["스마트폰"];

    if(totalParts.length){
      blocks.push(`💻 전자기기 총합\n${totalParts.join(" / ")}`);
    }
const extras = (current.extrasMemo || "").trim();

if(extras){
  blocks.push(`➕추가\n${formatExtrasOneLine(extras)}`);
}

    return `${header}\n${blocks.join("\n\n")}`.trim();
  }

function parsePreviewText(text){
  const chunks = String(text || "")
    .split(/\n{2,}/)
    .map(v => v.trim())
    .filter(Boolean);

  let header = "";
  let totals = "";
  let extras = "";
  const programMap = new Map();
  const order = [];

  for(const chunk of chunks){
    if(chunk.startsWith("◆ ")){
      header = chunk;
    }else if(chunk.startsWith("✔ ")){
      const firstLine = chunk.split("\n")[0].trim();
      programMap.set(firstLine, chunk);
      order.push(firstLine);
    }else if(chunk.startsWith("💻 ")){
      totals = chunk;
    }else if(chunk.startsWith("➕")){
      extras = chunk;
    }
  }

  return { header, totals, extras, programMap, order };
}

function mergePreviewText(savedText, autoText){
  const saved = parsePreviewText(savedText);
  const auto = parsePreviewText(autoText);

  const mergedBlocks = auto.order.map(title => {
    return saved.programMap.get(title) || auto.programMap.get(title);
  }).filter(Boolean);

  return [
    auto.header,
    ...mergedBlocks,
    auto.totals,
    auto.extras
  ].filter(Boolean).join("\n\n");
}

function buildFinalPreviewText(){
  return elPreviewBox.value || buildKakaoText();
}


function renderPreviewOnly(){
  const current = getCurrentData();
  const autoText = buildKakaoText();
  const mergedText = mergePreviewText(current.previewText || "", autoText);

  current.previewText = mergedText;
  elPreviewBox.value = mergedText;

  saveState();
  buildPrintArea();
}


elPreviewBox.addEventListener("input", ()=>{
  const current = getCurrentData();
  current.previewText = elPreviewBox.value;
  saveState();
});

document.getElementById("btnPreviewReset").onclick = ()=>{
  const current = getCurrentData();
  current.previewText = buildKakaoText();
  saveState();
  renderPreviewOnly();
};


function buildPrintArea(){
  const current = getCurrentData();
  const meta = current.meta;
  const school = (meta.school||"").trim() || "-";
  const session = (meta.session||"").trim() || "-";
  const date = (meta.date||"").trim() || "-";
  const people = Number(meta.people||0);
  const selectedCount = current.selected.length;

  const printData = buildPrintText();

  const programsHtml = printData.programBlocks.map(block => {
    const lines = String(block).split("\n");
    const title = lines[0] || "";
    const content = lines.slice(1).join("\n");

    return `
      <div class="printProgram">
        <div class="printProgramTitle">${escapeHtml(title)}</div>
        <div class="printProgramContent">${escapeHtml(content)}</div>
      </div>
    `;
  }).join("");

const extrasHtml = printData.extras
  ? `<div class="printProgram">
      <div class="printProgramTitle">➕추가</div>
      <div class="printProgramContent">${escapeHtml(formatExtrasOneLine(printData.extras.replace(/^➕추가\s*/, "")))}</div>
    </div>`
  : "";

  elPrintArea.innerHTML = `
    <div class="printSheet">
      <div class="printHead">
        <div class="printHeadTitle">${getModeLabel(state.mode)} 교구 점검표</div>
        <div class="printMeta">
          <div>날짜: ${escapeHtml(date)}</div>
          <div>학교명: ${escapeHtml(school)}</div>
          <div>차시: ${escapeHtml(session)}</div>
          <div>인원: ${people}명</div>
          <div>선택 프로그램: ${selectedCount}개</div>
        </div>
      </div>

      ${programsHtml}
      ${extrasHtml}
    </div>
  `;
}

function buildPrintText(){
  const current = getCurrentData();
  const meta = current.meta;
  const date = (meta.date || "").trim();
  const session = (meta.session || "").trim();
  const people = Number(meta.people || 0);


  const parsed = parsePreviewText(elPreviewBox.value || buildKakaoText());

  const headerParts = [];
  if(date) headerParts.push(date);
  if(session) headerParts.push(session);

 const header = "";

  const programBlocks = [];

  for(const id of current.selected){
    const full = buildProgramText(id);
    if(!full) continue;

    const savedBlock = parsed.programMap.get(`✔ ${full.title}`);
    const hiddenLines = (current.programData[id].notes || "")
      .split("\n")
      .map(v => v.trim())
      .filter(v => v.startsWith("⚠️ 확인") || v.startsWith("🔋 소모"));

let contentLines = [];

if(savedBlock){
  contentLines = savedBlock
    .split("\n")
    .slice(1)
    .map(v => v.trim())
    .filter(Boolean);
}else{
  contentLines = (full.content || "")
    .split("\n")
    .map(v => v.trim())
    .filter(Boolean);
}

// 이미 들어있는 확인/소모는 제거
contentLines = contentLines.filter(
  v => !v.startsWith("⚠️ 확인") && !v.startsWith("🔋 소모")
);

const merged = [...contentLines, ...hiddenLines];

    programBlocks.push(`✔ ${full.title}\n${merged.join("\n")}`.trim());
  }

  const totals = parsed.totals || "";
  const extras = parsed.extras || "";

  return {
    header,
    programBlocks,
    totals,
    extras
  };
}

function render(){
  bindMeta();
  updateModeButtons();
  renderProgramList();
  renderAssign();
  renderInfoNote();
  renderTotalsInline();
  renderExtrasMemo();
  renderPreviewOnly();
  elPickedCount.textContent = String(getCurrentData().selected.length);
}

  elSearch.addEventListener("input", renderProgramList);

  document.getElementById("btnAll").onclick = ()=>{
    const current = getCurrentData();
    const programs = getFilteredPrograms(); // 검색된 목록만 선택

    current.selected = programs.map(p => p.id);

    const people = clampInt(current.meta.people);

    for(const p of programs){
      const d = makeDefaultProgramData(state.mode, p, people);
      current.programData[p.id] = {
        ...current.programData[p.id],
        ...d,
        notes: (current.programData[p.id] && current.programData[p.id].notes && current.programData[p.id].notes.trim())
          ? current.programData[p.id].notes
          : d.notes
      };
    }

    saveState();
    render();
  };

  document.getElementById("btnNone").onclick = ()=>{
    const current = getCurrentData();
    current.selected = [];
    saveState();
    render();
  };


  document.getElementById("btnCopy").onclick = async ()=>{
    const text = buildFinalPreviewText();

    try{
      await navigator.clipboard.writeText(text);
      alert("톡용 문구가 복사됐어요");
    }catch{
      prompt("복사가 막혔어요. 아래 문구를 복사하세요", text);
    }
  };

  document.getElementById("btnPrint").onclick = ()=>{
    buildPrintArea();
    window.print();
  };

  document.getElementById("btnReset").onclick = ()=>{
    if(!confirm(`정말 ${getModeLabel(state.mode)} 데이터만 초기화할까요?`)) return;
    state[state.mode] = buildModeData(state.mode);
    saveState();
    render();
  };

  render();
</script>
